<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写真シェア - 国際会議2026</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #f5f7fc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page-header {
            background-color: white;
            padding: 50px 20px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .back-button {
            font-size: 1.8rem;
            text-decoration: none;
            color: #1e293b;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .upload-button {
            margin: 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 20px;
        }
        .photo-item {
            aspect-ratio: 1;
            background-color: #e2e8f0;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            color: white;
            padding: 8px;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .photo-item:hover .photo-overlay {
            opacity: 1;
        }
        .photo-info {
            padding: 20px;
            background-color: white;
            margin: 20px;
            border-radius: 18px;
            text-align: center;
            color: #64748b;
        }
        .bottom-nav {
            display: flex;
            background-color: white;
            border-top: 1px solid #e9edf2;
            padding: 8px 0;
            margin-top: auto;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            font-size: 0.7rem;
            gap: 4px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <a href="index.html" class="back-button">←</a>
        <h1>写真シェア</h1>
    </header>

    <button class="upload-button" onclick="alert('写真アップロード機能は準備中です')">
        <span>📸</span> 写真をアップロード
    </button>

    <div class="photo-grid">
        <!-- 写真プレースホルダー -->
        <div class="photo-item">
            <div style="width:100%; height:100%; background: linear-gradient(45deg, #0b1e33, #2563eb); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">🏛️</div>
            <div class="photo-overlay">開会式</div>
        </div>
        <div class="photo-item">
            <div style="width:100%; height:100%; background: linear-gradient(45deg, #1e3a8a, #3b82f6); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">👥</div>
            <div class="photo-overlay">懇親会</div>
        </div>
        <div class="photo-item">
            <div style="width:100%; height:100%; background: linear-gradient(45deg, #065f46, #10b981); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">🏭</div>
            <div class="photo-overlay">工場見学</div>
        </div>
        <div class="photo-item">
            <div style="width:100%; height:100%; background: linear-gradient(45deg, #854d0e, #eab308); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">🍣</div>
            <div class="photo-overlay">ランチ</div>
        </div>
        <div class="photo-item">
            <div style="width:100%; height:100%; background: linear-gradient(45deg, #7e22ce, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">🎤</div>
            <div class="photo-overlay">基調講演</div>
        </div>
        <div class="photo-item">
            <div style="width:100%; height:100%; background: linear-gradient(45deg, #b91c1c, #ef4444); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">🇯🇵</div>
            <div class="photo-overlay">日本代表団</div>
        </div>
    </div>

    <div class="photo-info">
        <p>写真をアップロードして、参加者と共有しましょう</p>
        <p style="font-size: 0.8rem; margin-top: 8px;">📸 現在 23枚の写真が共有されています</p>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span>🏠</span>
            <span>ホーム</span>
        </a>
        <a href="schedule.html" class="nav-item">
            <span>📅</span>
            <span>日程</span>
        </a>
        <a href="local.html" class="nav-item">
            <span>📍</span>
            <span>現地</span>
        </a>
        <a href="events.html" class="nav-item">
            <span>📋</span>
            <span>イベント</span>
        </a>
        <a href="photos.html" class="nav-item active">
            <span>📸</span>
            <span>写真</span>
        </a>
    </nav>
</body>
</html>
